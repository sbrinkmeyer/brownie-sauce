<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brownie</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1008;
      color: #d4a96a;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      user-select: none;
      -webkit-app-region: drag;
      padding: 16px 14px 10px;
      height: 100vh;
      display: flex;
      align-items: center;
    }

    button, input, label {
      -webkit-app-region: no-drag;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      min-height: 28px;
    }

    #play-btn,
    #mode-btn {

      border-radius: 6px;
      height: 26px;
      min-width: 34px;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      line-height: 1;
      text-transform: uppercase;
      border: 1px solid #6b3a1f;
      background: #372012;
      color: #c6985d;
    }

    #play-btn:hover,
    #mode-btn:hover { background: #7d4525; }

    #play-btn:active,
    #mode-btn:active { background: #5a2f18; }

    #mode-btn {
      min-width: 62px;
      padding: 0 10px;
      text-transform: lowercase;
    }

    #mode-btn.active,
    #play-btn.active {
      background: #8a4d27;
      color: #ffe1ba;
      border-color: #a0622a;
      box-shadow: 0 0 0 1px #a0622a inset;
    }

    .vol-wrap {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 0;
      position: relative;
      padding: 0 2px;
      border-radius: 6px;
      background: #26170c;
    }

    #volume {
      width: 100%;
      height: 26px;
      cursor: pointer;
      accent-color: #a0622a;
      background: transparent;
    }

    #volume-value {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      min-width: 34px;
      height: 20px;
      border: 1px solid #7b4d2a;
      border-radius: 4px;
      background: #120b05;
      color: #f0d0a0;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #play-btn {
      min-width: 52px;
      margin-left: 0;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="mode-btn" aria-pressed="false" aria-label="Audio mode">mono</button>
    <div class="vol-wrap" id="vol-wrap" aria-label="Volume controls">
      <input type="range" id="volume" min="1" max="99" value="30" step="1" aria-label="Volume level">
      <span id="volume-value">30</span>
    </div>
    <button id="play-btn" aria-pressed="false" aria-label="Playback">off</button>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
