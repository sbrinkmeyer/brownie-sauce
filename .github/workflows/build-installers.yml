name: Build Installers

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release and tag"
        required: true
        default: false
        type: boolean
      tag:
        description: "Tag for release"
        required: false
        type: string
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG (${{ matrix.arch }})
        run: npx electron-builder --mac dmg --${{ matrix.arch }} --publish never

      - name: Upload mac artifact
        uses: actions/upload-artifact@v5
        with:
          name: brownie-mac-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows NSIS installer
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Upload windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: brownie-win-x64
          path: |
            dist/*.exe
            dist/*.exe.blockmap

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage
        run: npx electron-builder --linux AppImage --x64 --publish never

      - name: Upload linux artifact
        uses: actions/upload-artifact@v5
        with:
          name: brownie-linux-appimage-x64
          path: |
            dist/*.AppImage
            dist/*.AppImage.zsync

  release:
    runs-on: ubuntu-latest
    needs: [build-mac, build-win, build-linux]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    permissions:
      contents: write
    steps:
      - name: Validate release input
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
        run: |
          if [ -z "${{ inputs.tag }}" ]; then
            echo "When create_release is true, provide inputs.tag (example: v2.0.0)."
            exit 1
          fi

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v5
        with:
          name: brownie-mac-x64
          path: release-assets/mac-x64

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v5
        with:
          name: brownie-mac-arm64
          path: release-assets/mac-arm64

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v5
        with:
          name: brownie-win-x64
          path: release-assets/win-x64

      - name: Download Linux AppImage artifact
        uses: actions/download-artifact@v5
        with:
          name: brownie-linux-appimage-x64
          path: release-assets/linux-x64

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          cat > release-notes.md <<'EOF'
          ## macOS note for unsigned builds

          If macOS says the app cannot be opened because the developer cannot be verified:

          1. Move Brownie.app to Applications.
          2. In Finder, right-click Brownie.app and choose Open.
          3. Click Open again in the confirmation dialog.

          Terminal alternative:

          xattr -dr com.apple.quarantine /Applications/Brownie.app

          Only bypass Gatekeeper for builds you trust.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              release-assets/**/*.dmg \
              release-assets/**/*.exe \
              release-assets/**/*.AppImage \
              --clobber

            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --target "$RELEASE_SHA" \
              --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              release-assets/**/*.dmg \
              release-assets/**/*.exe \
              release-assets/**/*.AppImage \
              --target "$RELEASE_SHA" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              --notes-file release-notes.md
          fi
