name: Build Installers

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release and tag"
        required: true
        default: false
        type: boolean
      tag:
        description: "Tag for release"
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG (${{ matrix.arch }})
        run: npx electron-builder --mac dmg --${{ matrix.arch }} --publish never

      - name: Upload mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: brownie-mac-${{ matrix.arch }}
          path: dist/*

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows NSIS installer
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: brownie-win-x64
          path: dist/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage
        run: npx electron-builder --linux AppImage --x64 --publish never

      - name: Upload linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: brownie-linux-appimage-x64
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: [build-mac, build-win, build-linux]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
    permissions:
      contents: write
    steps:
      - name: Validate release input
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -z "${{ inputs.tag }}" ]; then
            echo "When create_release is true, provide inputs.tag (example: v2.0.0)."
            exit 1
          fi

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brownie-mac-x64
          path: release-assets/mac-x64

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brownie-mac-arm64
          path: release-assets/mac-arm64

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brownie-win-x64
          path: release-assets/win-x64

      - name: Download Linux AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: brownie-linux-appimage-x64
          path: release-assets/linux-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
            release-assets/**/*.AppImage
